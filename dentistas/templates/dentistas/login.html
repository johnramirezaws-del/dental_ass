ARCHIVO: dentistas/templates/dentistas/login.html
{% endcomment %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — DentalSaaS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-shell{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.auth-title{font-size:22px;font-weight:600;color:#111827;text-align:center;margin-bottom:6px}
.auth-sub{font-size:14px;color:#6b7280;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:15px;color:#111827;font-family:inherit;outline:none;transition:border-color .15s}
.form-control:focus{border-color:#10b981}
.btn-full{width:100%;padding:13px;border-radius:9px;border:none;background:#059669;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s}
.btn-full:hover{background:#047857}
.auth-link{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
.auth-link a{color:#059669;text-decoration:underline}
.alert-error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-logo">
    <div class="auth-icon">D</div>
  </div>
  <div class="auth-title">Bienvenido de vuelta</div>
  <div class="auth-sub">Ingresa a tu panel de gestión</div>

  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" placeholder="tu@email.com" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-full">Ingresar</button>
  </form>

  <div class="auth-link">
    ¿No tienes cuenta? <a href="{% url 'dentistas:registro' %}">Regístrate gratis</a>
  </div>
</div>
</body>
</html>
